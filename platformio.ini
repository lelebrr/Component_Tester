; ============================================================================
; Sondvolt v3.2 — Cheap Yellow Display (ESP32-2432S028R)
; CONFIGURAÇÃO FINAL — ESTABILIDADE TOTAL
; ============================================================================

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.partitions = huge_app.csv

build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=0
    -w
    ; ---- TFT_eSPI config ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1 ; Driver específico para corrigir o deslocamento da CYD
    -DTFT_ROTATION=3     ; Rotação 3 (Paisagem)
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=0
    -DTFT_BL=21
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DTOUCH_CS=33
    -DTOUCH_SCLK=25
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.9.2
    adafruit/Adafruit INA219 @ ^1.2.3
    greiman/SdFat @ ^2.2.3
